<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Major creative eras | Kanye West Archive</title>
	<style>
		:root {
			--bg: #080807;
			--bg-soft: #11100e;
			--card: rgba(255, 255, 255, 0.06);
			--line: rgba(255, 255, 255, 0.13);
			--text: #f5f0e8;
			--muted: #c9beb0;
			--gold: #d7b56d;
			--radius: 24px;
			--max: 1180px;
		}

		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		html {
			scroll-behavior: smooth;
		}

		body {
			min-height: 100vh;
			font-family: Inter, Arial, Helvetica, sans-serif;
			background:
				radial-gradient(circle at 20% 10%, rgba(215,181,109,0.16), transparent 26rem),
				radial-gradient(circle at 80% 25%, rgba(184,68,53,0.11), transparent 24rem),
				linear-gradient(180deg, #0b0a09 0%, #080807 42%, #0d0c0a 100%);
			color: var(--text);
			line-height: 1.65;
			overflow-x: hidden;
			position: relative;
		}

		.noise {
			position: fixed;
			inset: 0;
			pointer-events: none;
			z-index: 100;
			opacity: 0.055;
			background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
		}

		.cursor-glow {
			position: fixed;
			width: 360px;
			height: 360px;
			border-radius: 50%;
			background: radial-gradient(circle, rgba(215,181,109,0.16), transparent 65%);
			transform: translate(-50%, -50%);
			pointer-events: none;
			z-index: 1;
			mix-blend-mode: screen;
		}

		.progress {
			position: fixed;
			top: 0;
			left: 0;
			height: 4px;
			width: 0%;
			background: linear-gradient(90deg, var(--gold), #b84435);
			z-index: 999;
		}

		main {
			position: relative;
			z-index: 2;
		}

		section {
			padding: 92px 22px;
		}

		.section-inner {
			width: min(var(--max), 100%);
			margin: 0 auto;
		}

		.section-head {
			display: grid;
			grid-template-columns: minmax(0, 0.8fr) minmax(280px, 1fr);
			gap: 42px;
			align-items: end;
			margin-bottom: 42px;
		}

		.section-kicker {
			color: var(--gold);
			text-transform: uppercase;
			letter-spacing: 0.16em;
			font-size: 0.78rem;
			margin-bottom: 14px;
		}

		h2 {
			font-size: clamp(2.4rem, 7vw, 5.8rem);
			line-height: 0.92;
			text-transform: uppercase;
			letter-spacing: -0.065em;
		}

		.lead {
			color: var(--muted);
			font-size: 1.08rem;
			max-width: 760px;
		}

		.timeline-wrap {
			position: relative;
			margin-top: 20px;
			padding-left: 54px;
		}

		.timeline-line {
			position: absolute;
			left: 20px;
			top: 0;
			width: 2px;
			height: 100%;
			background: var(--line);
		}

		.timeline-fill {
			position: absolute;
			left: 20px;
			top: 0;
			width: 2px;
			height: 0%;
			background: linear-gradient(var(--gold), #b84435);
		}

		.timeline-item {
			position: relative;
			margin-bottom: 28px;
			padding-left: 0;
			align-items: start;
		}

		.timeline-dot {
			position: absolute;
			left: 11px;
			top: 24px;
			width: 20px;
			height: 20px;
			border-radius: 50%;
			background: var(--bg-soft);
			border: 2px solid var(--gold);
			box-shadow: 0 0 0 6px rgba(215,181,109,0.1);
		}

		.timeline-card {
			display: grid;
			grid-template-columns: 140px 1fr;
			gap: 22px;
			padding: 22px;
			border-radius: 22px;
			border: 1px solid var(--line);
			background: var(--card);
			align-items: start;
		}

		.timeline-cover {
			width: 140px;
			height: 140px;
			overflow: hidden;
			border-radius: 18px;
		}

		.timeline-cover img {
			display: block;
			width: 100%;
			height: 100%;
			object-fit: cover;
		}
		.timeline-card .year {
			color: var(--gold);
			font-size: 0.8rem;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			margin-bottom: 10px;
			display: inline-block;
		}

		.timeline-card h3 {
			margin-bottom: 12px;
			font-size: 1.65rem;
			line-height: 1.1;
		}

		.timeline-card p {
			color: var(--muted);
			line-height: 1.7;
		}

		.reveal {
			opacity: 0;
			transform: translateY(24px);
			transition: opacity .65s ease, transform .65s ease;
		}

		.reveal.in-view {
			opacity: 1;
			transform: translateY(0);
		}

		@media (max-width: 960px) {
			.section-head {
				grid-template-columns: 1fr;
			}

			.timeline-item {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<div class="progress" id="progress"></div>
	<div class="noise"></div>
	<div class="cursor-glow" id="cursorGlow"></div>

	<main>
		<section id="timeline">
			<div class="section-inner">
				<div class="section-head reveal">
					<div>
						<div class="section-kicker">02 / Timeline</div>
						<h2>Major creative eras.</h2>
					</div>
					<p class="lead">
						Each era has a different sound and look. This timeline shows how Kanye's music, fashion, and public image changed together.
					</p>
				</div>
				<div class="timeline-wrap" id="timelineWrap">
					<div class="timeline-line"></div>
					<div class="timeline-fill" id="timelineFill"></div>
					<div id="timelineItems"></div>
				</div>
			</div>
		</section>
	</main>

	<script>
		const eras = [
			{ year: '2004', title: 'The College Dropout', image: 'https://dummyimage.com/540x540/2f4f6f/f4efe7.png&text=College+Dropout', copy: 'Soul samples, humor, faith, class anxiety, and self-awareness. This is the era where Kanye proved a producer-rapper could become the center of mainstream hip-hop without copying the dominant image of the time.' },
			{ year: '2005', title: 'Late Registration', image: 'https://dummyimage.com/540x540/7d2628/f4efe7.png&text=Late+Registration', copy: 'A larger and more cinematic version of his early sound. The album added orchestral textures and showed that Kanye wanted rap albums to feel arranged and composed, not just beat-driven.' },
			{ year: '2007', title: 'Graduation', image: 'https://dummyimage.com/540x540/111111/f4efe7.png&text=Graduation', copy: 'A brighter, electronic, stadium-sized album. Graduation helped shift rap toward arena sounds and global pop ambition.' },
			{ year: '2008', title: '808s & Heartbreak', image: 'https://dummyimage.com/540x540/3d3d3d/f4efe7.png&text=808s+%26+Heartbreak', copy: 'Auto-Tuned pain, sparse drums, heartbreak, and emotional isolation. This became one of his most influential albums because it helped open the lane for melodic and vulnerable rap.' },
			{ year: '2010', title: 'My Beautiful Dark Twisted Fantasy', image: 'https://dummyimage.com/540x540/4a2b2b/f4efe7.png&text=MBDTF', copy: 'A maximalist comeback album built around ego, guilt, luxury, shame, and spectacle. This is often treated as his masterpiece because the production and concept feel huge but controlled.' },
			{ year: '2013', title: 'Yeezus', image: 'https://dummyimage.com/540x540/1a1a1a/f4efe7.png&text=Yeezus', copy: 'Industrial, abrasive, minimal, and confrontational. Yeezus made discomfort part of the design and connected strongly to his darker fashion direction.' },
			{ year: '2016', title: 'The Life of Pablo', image: 'https://dummyimage.com/540x540/523d53/f4efe7.png&text=The+Life+of+Pablo', copy: 'A fragmented, gospel-influenced, streaming-era album. It became known as a living album because Kanye kept changing it after release.' },
			{ year: '2018–2021', title: 'Ye, Jesus Is King, Donda', image: 'https://dummyimage.com/540x540/393a36/f4efe7.png&text=Donda', copy: 'A later period focused on confession, faith, grief, family, and public spectacle. Donda especially turned the album rollout into a stadium-sized event.' }
		];

		const timelineItems = document.getElementById('timelineItems');
		eras.forEach((era) => {
			timelineItems.insertAdjacentHTML('beforeend', `
				<article class="timeline-item reveal">
					<div class="timeline-dot"></div>
					<div class="timeline-card">
						<div class="timeline-cover">
							<img src="${era.image}" alt="${era.title} album cover">
						</div>
						<div>
							<div class="year">${era.year}</div>
							<h3>${era.title}</h3>
							<p>${era.copy}</p>
						</div>
					</div>
				</article>
			`);
		});

		const revealObserver = new IntersectionObserver((entries) => {
			entries.forEach(entry => {
				if (entry.isIntersecting) entry.target.classList.add('in-view');
			});
		}, { threshold: 0.12 });

		document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

		const progress = document.getElementById('progress');
		const timelineFill = document.getElementById('timelineFill');
		const timelineWrap = document.getElementById('timelineWrap');

		function updateScrollEffects() {
			const scrollTop = window.scrollY;
			const docHeight = document.documentElement.scrollHeight - window.innerHeight;
			progress.style.width = `${(scrollTop / docHeight) * 100}%`;

			const rect = timelineWrap.getBoundingClientRect();
			const timelineHeight = timelineWrap.offsetHeight - window.innerHeight * 0.25;
			const progressWithin = Math.min(1, Math.max(0, (window.innerHeight * 0.65 - rect.top) / timelineHeight));
			timelineFill.style.height = `${progressWithin * 100}%`;
		}

		window.addEventListener('scroll', updateScrollEffects);
		updateScrollEffects();

		const cursorGlow = document.getElementById('cursorGlow');
		window.addEventListener('mousemove', (e) => {
			cursorGlow.style.left = `${e.clientX}px`;
			cursorGlow.style.top = `${e.clientY}px`;
		});
	</script>
</body>
</html>
